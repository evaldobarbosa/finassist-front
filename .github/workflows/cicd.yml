name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-pr:
    name: Build (PR Validation)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.number }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.number }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Fail on critical vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:pr-${{ github.event.number }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:production
            ${{ env.DOCKER_IMAGE }}:build-${{ github.run_number }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:production
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push Docker image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:production
          docker push ${{ env.DOCKER_IMAGE }}:build-${{ github.run_number }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ~/finassistant/front
            cd ~/finassistant/front

            cat > .env << 'ENVEOF'
            DOCKER_IMAGE=ghcr.io/${{ github.repository }}
            TAG=production
            FRONT_HOST=${{ vars.FRONT_HOST }}
            BUILD_ID=${{ steps.vars.outputs.short_sha }}
            ENVEOF

            curl -sSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              -o docker-compose.github.yml \
              "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.github.yml?ref=main"

            curl -sSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              -o deploy.sh \
              "https://api.github.com/repos/${{ github.repository }}/contents/deploy.sh?ref=main"

            chmod +x deploy.sh
            echo "${{ secrets.GITHUB_TOKEN }}" > .github_token
            chmod 600 .github_token
            export GITHUB_USER="${{ github.actor }}"
            ./deploy.sh production

      - name: Wait for application startup
        run: sleep 15

      - name: Health check
        run: |
          echo "Verificando saude da aplicacao..."
          FRONT_URL="https://${{ vars.FRONT_HOST }}"
          for i in {1..5}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "${FRONT_URL}/health" || echo "000")
            if [ "$response" = "200" ]; then
              echo "Health check passou! (HTTP $response)"
              exit 0
            fi
            echo "Tentativa $i/5 - HTTP $response, aguardando..."
            sleep 5
          done
          echo "Health check falhou apos 5 tentativas"
          exit 1

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-production]
    if: always() && github.event_name == 'push'

    steps:
      - name: Set status message
        id: status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "failure" ]; then
            echo "status=FALHOU" >> $GITHUB_OUTPUT
            echo "message=Build da imagem Docker falhou" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-production.result }}" == "failure" ]; then
            echo "status=FALHOU" >> $GITHUB_OUTPUT
            echo "message=Deploy para producao falhou" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "status=SUCESSO" >> $GITHUB_OUTPUT
            echo "message=Deploy para producao concluido" >> $GITHUB_OUTPUT
          else
            echo "status=SKIPPED" >> $GITHUB_OUTPUT
            echo "message=Pipeline concluida (sem deploy)" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            *FinAssistant Frontend - CI/CD*

            *Status:* ${{ steps.status.outputs.status }}

            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.sha }}`
            *Autor:* ${{ github.actor }}

            ${{ steps.status.outputs.message }}

            [Ver workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
